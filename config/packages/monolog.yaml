monolog:
    channels:
        - deprecation

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "php://stderr"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: rotating_file
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: info
                max_files: 14
                channels: ["!deprecation"]
            error:
                type: rotating_file
                path: "%kernel.logs_dir%/error.log"
                level: error
                max_files: 30
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            # --- Alertes email ---
            mail_buffer:
                type: fingers_crossed
                action_level: error
                handler: mail_dedup
                excluded_http_codes: [404, 405]
                buffer_size: 50
            mail_dedup:
                type: deduplication
                handler: mail_sender
                store: "%kernel.cache_dir%/monolog_dedup.log"
                time: 300
            mail_sender:
                type: symfony_mailer
                to_email: "%env(MAILER_TO)%"
                from_email: "%env(MAILER_FROM)%"
                subject: "[SBL API] Erreur en production"
                level: error
                mailer: mailer.mailer
