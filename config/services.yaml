# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    discord.client_id: '%env(DISCORD_CLIENT_ID)%'
    discord.client_secret: '%env(DISCORD_CLIENT_SECRET)%'
    discord.redirect_uri: '%env(DISCORD_REDIRECT_URI)%'
    discord.bot_secret: '%env(DISCORD_BOT_SECRET)%'
    discord.frontend_url: '%env(FRONTEND_URL)%'
    vapid.public_key: '%env(VAPID_PUBLIC_KEY)%'
    vapid.private_key: '%env(VAPID_PRIVATE_KEY)%'
    vapid.subject: '%env(VAPID_SUBJECT)%'
    match_result.reminder_day: '%env(MATCH_RESULT_REMINDER_DAY)%'
    match_result.reminder_hour: '%env(int:MATCH_RESULT_REMINDER_HOUR)%'
    match_result.deadline_day: '%env(MATCH_RESULT_DEADLINE_DAY)%'
    match_result.deadline_hour: '%env(int:MATCH_RESULT_DEADLINE_HOUR)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            # - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/AppBundle/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\DiscordOAuthService:
        arguments:
            $clientId: '%discord.client_id%'
            $clientSecret: '%discord.client_secret%'
            $redirectUri: '%discord.redirect_uri%'
            $botSecret: '%discord.bot_secret%'
            $frontendUrl: '%discord.frontend_url%'

    App\Service\PushNotificationService:
        arguments:
            $vapidPublicKey: '%vapid.public_key%'
            $vapidPrivateKey: '%vapid.private_key%'
            $vapidSubject: '%vapid.subject%'

    App\MessageHandler\MatchResultTimeoutHandler:
        arguments:
            $matchResultReminderDay: '%match_result.reminder_day%'
            $matchResultReminderHour: '%match_result.reminder_hour%'
            $matchResultDeadlineDay: '%match_result.deadline_day%'
            $matchResultDeadlineHour: '%match_result.deadline_hour%'
